name: Windows Package

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to package
        required: true
        type: string

concurrency:
  group: windows-package-${{ github.event.inputs.tag_name }}
  cancel-in-progress: true

jobs:
  build-windows-package:
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test -- --run

      - name: Compute package metadata
        id: package_meta
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag_name }}"
          $exeName = "velo_${tag}_windows_x64.exe"
          $zipName = "velo_${tag}_windows_x64.zip"
          "exe_name=$exeName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Windows executable
        shell: pwsh
        run: |
          pnpm dlx pkg@5.8.1 dist/index.js --targets node18-win-x64 --output "${{ steps.package_meta.outputs.exe_name }}"

      - name: Build Windows package
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ steps.package_meta.outputs.exe_name }}",README.md -DestinationPath "${{ steps.package_meta.outputs.zip_name }}" -Force

      - name: Upload Windows package to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: |
            ${{ steps.package_meta.outputs.exe_name }}
            ${{ steps.package_meta.outputs.zip_name }}
